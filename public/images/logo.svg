<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Organic tech gradient matching brand colors -->
    <linearGradient id="giveHopeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E4036" />
      <stop offset="50%" stop-color="#3d5648" />
      <stop offset="100%" stop-color="#CC5833" />
    </linearGradient>
    
    <!-- Subtle glow/shadow for depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Abstract Monogram / Shape -->
  <g transform="translate(10, 10)">
    <!-- Base geometric structure (The "G" / Cycle / Unity) -->
    <path 
      d="M 50 10 
         A 40 40 0 1 0 90 50 
         L 50 50" 
      fill="none" 
      stroke="url(#giveHopeGrad)" 
      stroke-width="14" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      filter="url(#glow)"
    />
    
    <!-- Inner Spark / The "Hope" -->
    <circle cx="68" cy="32" r="8" fill="#CC5833" />
  </g>
</svg>
